services:

  # ── PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: bazaar_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       bazaar
      POSTGRES_USER:     bazaar
      POSTGRES_PASSWORD: bazaarpass
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bazaar -d bazaar"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── MinIO (S3-compatible object storage) ───────────────────
  minio:
    image: minio/minio:latest
    container_name: bazaar_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Backend (Node.js / Express) ─────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bazaar_backend
    restart: unless-stopped
    environment:
      PORT:          3000
      PG_HOST:       postgres
      PG_PORT:       5432
      PG_DB:         bazaar
      PG_USER:       bazaar
      PG_PASSWORD:   bazaarpass
      MINIO_ENDPOINT: minio
      MINIO_PORT:    9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET:  product-images
      MINIO_USE_SSL: "false"
      JWT_SECRET:    bazaar-school-project-secret
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  # ── Frontend (nginx) ────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bazaar_frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  minio_data:
